name: Build TagTinker FAP

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ufbt
        run: pip install ufbt

      - name: Build FAP
        run: ufbt

      - name: Upload FAP
        uses: actions/upload-artifact@v4
        with:
          name: tagtinker.fap
          path: dist/*.fap
